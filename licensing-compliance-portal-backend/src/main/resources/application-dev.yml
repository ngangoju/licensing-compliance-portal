spring:
  datasource:
    url: jdbc:h2:file:./h2db/bnr_licensing_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        # Prevent "schema bnr not found" errors in H2
        default_schema: PUBLIC
  flyway:
    enabled: false
