spring:
  profiles:
    active: dev
  application:
    name: licensing-compliance-portal
  datasource:
    url: jdbc:postgresql://localhost:5432/bnr_licensing
    username: bnr_app
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        default_schema: bnr
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    user: bnr_app
    password: password
    default-schema: bnr
    schemas: bnr,audit
    create-schemas: true

jwt:
  secret: ${JWT_SECRET:Ym5yX2xpY2Vuc2luZ19jb21wbGlhbmNlX3BvcnRhbF92ZXJ5X3NlY3VyZV9rZXlfZm9yX2p3dA==}
  expiration: 900000 # 15 minutes (in ms)
  refresh-expiration: 604800000 # 7 days (in ms)

storage:
  base-path: ${DOCUMENT_STORAGE_PATH:storage}

springdoc:
  show-login-endpoint: true

logging:
  level:
    rw.bnr.licensing: DEBUG
    org.springframework.security: INFO
